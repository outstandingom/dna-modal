name: knowledge_graph_env
description: Customer support ticket triage for a SaaS company. The agent must (1) classify the issue type, (2) identify the correct internal KB article relation, and (3) suggest a resolution. Used to train automated support agents.
version: "1.0.0"
tasks:
  - id: easy
    name: "Intent Identification"
    grader: "task_easy"
  - id: medium
    name: "Relational Mapping"
    grader: "task_medium"
  - id: hard
    name: "Multi-hop Resolution"
    grader: "task_hard"
metadata:
  framework: "FastAPI"
  vector_store: "FAISS"
  embedding_dims: 16
